server {
    # Ingress terminates TLS. Frontend pod only serves HTTP internally.
    listen 80;
    server_name stockvn.online www.stockvn.online;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Chuyển tiếp tới auth-service
    location /api/auth/ {
        proxy_pass http://auth-service:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Chuyển tiếp tới forum-service
    location /api/forum/ {
        proxy_pass http://forum-service:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /stub_status {
        stub_status;
        allow all; # Mở ra cho Prometheus cào data
    }
}