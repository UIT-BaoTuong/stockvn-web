apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http        # <-- Thêm tên ở đây
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https       # <-- Cổng này đã có tên, rất tốt
      protocol: TCP
      port: 443
      targetPort: 443