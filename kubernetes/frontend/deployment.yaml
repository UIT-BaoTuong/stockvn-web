apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/tuongndb1609/frontend:v3
          ports:
            - containerPort: 80
            - containerPort: 443 # <-- Mở thêm cổng HTTPS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1"
          volumeMounts:
            - name: certs-volume
              mountPath: "/etc/nginx/certs" # <-- Nơi Nginx sẽ tìm thấy file cert
              readOnly: true
      volumes:
        - name: certs-volume
          secret:
            secretName: stockvn-tls-secret # <-- Tên Secret bạn vừa tạo thành công