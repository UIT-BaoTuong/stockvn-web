apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-services-monitor
  labels:
    release: monitoring-stack
spec:
  selector:
    matchExpressions:
      - {key: app, operator: In, values: [auth-service, forum-service]}
  endpoints:
    - port: http-8080 # Nhớ dặn Tường đặt tên port trong file K8s Service là 'http-8080'
      path: /actuator/prometheus
      interval: 15s