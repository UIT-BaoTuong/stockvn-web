apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    # 1. Ép redirect ở mức Ingress
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # 2. Cấu hình CỰC KỲ QUAN TRỌNG: Báo cho Backend là traffic đã được bảo mật
    nginx.ingress.kubernetes.io/proxy-set-headers: "X-Forwarded-Proto: https"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    
    # 3. Nếu App của bạn chạy bằng ASP.NET hoặc Java/Node.js, thêm dòng này:
    nginx.ingress.kubernetes.io/proxy-redirect-from: "http://"
    nginx.ingress.kubernetes.io/proxy-redirect-to: "https://"
spec:
  tls:
  - hosts:
    - stockvn.online
    - www.stockvn.online
    secretName: stockvn-tls-secret
  rules:
  - host: stockvn.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80