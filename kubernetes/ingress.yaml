apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    # Ép buộc HTTPS nhưng thông báo cho App biết là traffic đã được giải mã SSL rồi
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Thêm dòng này để báo cho Backend biết đây là traffic từ HTTPS
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  tls:
  - hosts:
    - stockvn.online
    - www.stockvn.online
    secretName: stockvn-tls-secret
  rules:
  - host: stockvn.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80