apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    # 1. Ép buộc chuyển hướng sang HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # 2. THAY THẾ SNIPPET: Tự động gửi X-Forwarded-Proto: https vào Backend
    # Giúp App nhận ra traffic đã bảo mật và ngừng vòng lặp Redirect
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    
    # 3. Hỗ trợ lấy IP thật của người dùng qua Azure Load Balancer
    nginx.ingress.kubernetes.io/enable-real-ip: "true"
    
    # 4. Tăng thời gian chờ nếu App xử lý chậm (Tránh lỗi 504)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  tls:
  - hosts:
    - stockvn.online
    - www.stockvn.online
    secretName: stockvn-tls-secret
  rules:
  - host: stockvn.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
  - host: www.stockvn.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80