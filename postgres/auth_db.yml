version: '3.8'

services:
  auth-db: 
    image: postgres:17-alpine 
    container_name: auth-db-container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aa123456
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - ./auth_data:/var/lib/postgresql/data

  auth-db-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: auth-db-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:Aa123456@auth-db:5432/auth_db?sslmode=disable"
    ports:
      - "9187:9187" # Mở cổng 9187 cho Prometheus cào
    depends_on:
      - auth-db
